<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">
  <defs>
    <style>
      @keyframes pulseGlow {
        0% { opacity: 0.7; }
        50% { opacity: 1; filter: drop-shadow(0 0 12px #D1B464); }
        100% { opacity: 0.7; }
      }
      @keyframes flameWave {
        0% { transform: rotate(-1.5deg) scale(0.95); }
        50% { transform: rotate(2deg) scale(1.03) skewX(1deg); }
        100% { transform: rotate(-1.5deg) scale(0.95); }
      }
      .star-glow { animation: pulseGlow 4s infinite ease-in-out; }
      .flame-anim { 
        animation: flameWave 2.5s infinite ease-in-out;
        transform-origin: 28px 42px;
      }
    </style>

    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1E1A22"/>
      <stop offset="60%" stop-color="#16131A"/>
      <stop offset="100%" stop-color="#0E0C10"/>
    </radialGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E6C1"/>
      <stop offset="25%" stop-color="#E8D5A3"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="75%" stop-color="#8A7A3C"/>
      <stop offset="100%" stop-color="#5C4A1E"/>
    </linearGradient>

    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#8A7A3C"/>
      <stop offset="100%" stop-color="#5C4A1E"/>
    </linearGradient>

    <linearGradient id="flameBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4E6C1"/>
      <stop offset="30%" stop-color="#E8D5A3"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8A7A3C"/>
    </linearGradient>

    <!-- 高光渐变：底部透明 → 顶部亮白 -->
    <linearGradient id="flameHighlight" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8D5A3" stop-opacity="0"/>
      <stop offset="40%" stop-color="#F4E6C1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#E3D5B8"/>
    </linearGradient>

    <filter id="magicGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bgGrad)"/>

  <path class="star-glow" d="M 300,75 L 302.5,90 L 317,92.5 L 302.5,95 L 300,110 L 297.5,95 L 283,92.5 L 297.5,90 Z" fill="url(#goldGrad)" filter="url(#magicGlow)"/>

  <g id="scale-group">
    <path d="M 220,410 Q 300,398 380,410" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 230,402 Q 300,392 370,402" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 250,394 Q 300,386 350,394" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 260,394 Q 250,388 255,380 Q 265,385 275,388" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
    <path d="M 340,394 Q 350,388 345,380 Q 335,385 325,388" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>

    <path d="M 290,220 Q 282,300 288,390" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 310,220 Q 318,300 312,390" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 294,225 Q 288,300 292,390" fill="none" stroke="url(#goldDark)" stroke-width="0.8" opacity="0.4"/>
    <path d="M 300,225 Q 296,300 298,390" fill="none" stroke="url(#goldDark)" stroke-width="0.8" opacity="0.3"/>
    <path d="M 306,225 Q 312,300 308,390" fill="none" stroke="url(#goldDark)" stroke-width="0.8" opacity="0.4"/>
    <path d="M 282,220 Q 300,212 318,220" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 285,215 Q 300,208 315,215" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <circle cx="300" cy="205" r="20" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
    <circle cx="300" cy="205" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="300" cy="205" r="5" fill="url(#goldGrad)" filter="url(#softGlow)"/>
    <path d="M 280,205 C 270,200 265,210 275,215 C 280,218 278,205 282,202" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>
    <path d="M 320,205 C 330,200 335,210 325,215 C 320,218 322,205 318,202" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>

    <path d="M 120,215 Q 300,180 480,215" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 125,215 Q 300,185 475,215" fill="none" stroke="#F4E6C1" stroke-width="0.8" opacity="0.3"/>
    <path d="M 120,215 C 105,210 100,225 112,230 C 118,232 115,218 122,215" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="112" cy="230" r="5" fill="url(#goldGrad)" filter="url(#softGlow)"/>
    <path d="M 480,215 C 495,210 500,225 488,230 C 482,232 485,218 478,215" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="488" cy="230" r="5" fill="url(#goldGrad)" filter="url(#softGlow)"/>

    <g id="left-tray">
      <line x1="120" y1="215" x2="110" y2="280" stroke="url(#goldDark)" stroke-width="2" stroke-dasharray="4,2"/>
      <line x1="120" y1="215" x2="140" y2="280" stroke="url(#goldDark)" stroke-width="2" stroke-dasharray="4,2"/>
      <line x1="120" y1="215" x2="125" y2="280" stroke="url(#goldDark)" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
      <path d="M 80,280 Q 130,310 180,280" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
      <path d="M 85,280 Q 130,300 175,280" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
      <path d="M 80,280 C 75,275 70,285 78,288" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 180,280 C 185,275 190,285 182,288" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 80,280 Q 130,292 180,280" fill="none" stroke="#5C4A1E" stroke-width="1.5" opacity="0.4"/>

      <g transform="translate(115, 242)">
        <path d="M 4,4 Q 24,-1 44,7 L 40,38 Q 20,30 0,36 Z" fill="url(#paperGrad)"/>
        <path d="M 0,36 Q 20,30 40,38 Q 20,34 0,36 Z" fill="#8A7A3C" opacity="0.4"/>
        <ellipse cx="24" cy="4" rx="20" ry="3.5" fill="#E3D5B8" stroke="#947938" stroke-width="0.8"/>
        <ellipse cx="24" cy="3" rx="14" ry="1.5" fill="#473A1B" opacity="0.25"/>
        <ellipse cx="20" cy="36" rx="20" ry="3.5" fill="#D1B464" stroke="#947938" stroke-width="0.8"/>
        <line x1="10" y1="13" x2="34" y2="15" stroke="#8F7437" stroke-width="1.2" stroke-dasharray="3,1.5"/>
        <line x1="8" y1="20" x2="36" y2="21" stroke="#8F7437" stroke-width="1.2" stroke-dasharray="4,1"/>
        <line x1="12" y1="27" x2="30" y2="28" stroke="#8F7437" stroke-width="1.2" stroke-dasharray="2,2"/>
      </g>
    </g>

    <g id="right-tray">
      <line x1="480" y1="215" x2="470" y2="280" stroke="url(#goldDark)" stroke-width="2" stroke-dasharray="4,2"/>
      <line x1="480" y1="215" x2="490" y2="280" stroke="url(#goldDark)" stroke-width="2" stroke-dasharray="4,2"/>
      <line x1="480" y1="215" x2="480" y2="280" stroke="url(#goldDark)" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
      <path d="M 420,280 Q 470,310 520,280" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
      <path d="M 425,280 Q 470,300 515,280" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
      <path d="M 420,280 C 415,275 410,285 418,288" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 520,280 C 525,275 530,285 522,288" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 420,280 Q 470,292 520,280" fill="none" stroke="#5C4A1E" stroke-width="1.5" opacity="0.4"/>

      <!-- 两层火焰 -->
      <g transform="translate(442, 232)">
        <g class="flame-anim" filter="url(#magicGlow)">
          <!-- 外层：主体 -->
          <path d="M 16,38 Q 28,40 40,38 C 46,28 38,12 28,2 C 18,12 10,28 16,38 Z" fill="url(#flameBody)"/>
          <!-- 内层：高光核心 -->
          <path d="M 20,36 Q 28,37 36,36 C 40,30 34,18 28,10 C 22,18 16,30 20,36 Z" fill="url(#flameHighlight)" opacity="0.6"/>
          <!-- 结构线 -->
          <path d="M 24,35 Q 26,24 28,12" fill="none" stroke="#F4E6C1" stroke-width="0.6" opacity="0.3"/>
          <path d="M 32,35 Q 30,24 28,12" fill="none" stroke="#F4E6C1" stroke-width="0.6" opacity="0.3"/>
        </g>
      </g>
    </g>
  </g>

  <g text-anchor="middle">
    <text x="300" y="475" font-family="'Noto Serif CJK SC', 'Source Han Serif CN', 'SimSun', serif" font-size="28" font-weight="bold" fill="url(#goldGrad)" letter-spacing="5">梅菲斯特</text>
    <line x1="235" y1="487" x2="365" y2="487" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>
    <text x="300" y="505" font-family="'Garamond', 'Trajan Pro', 'Times New Roman', serif" font-size="14" fill="#D1B464" letter-spacing="3">MEPHISTO</text>
  </g>
</svg>